name: Backend CI

on:
  push:
    branches: [ main, "feature/**", "chore/**", "fix/**" ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build + tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build (skip tests)
        working-directory: backend
        run: ./mvnw -B -ntp -DskipTests package

      - name: Unit tests
        working-directory: backend
        run: ./mvnw -B -ntp -DexcludedGroups=integration test

      # Tests de integracion con Testcontainers (Docker disponible en runners de GitHub)
      - name: Integration tests (Testcontainers)
        working-directory: backend
        run: ./mvnw -B -ntp -DexcludedGroups= -Dgroups=integration verify

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/
          if-no-files-found: ignore
